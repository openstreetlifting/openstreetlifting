name: CD Frontend
on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/cd-frontend.yml

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openstreetlifting/frontend

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.sha_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA tag
        id: sha_tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha_tag.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  update-chart:
    name: Update Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump frontend image tag in chart
        run: |
          yq -i ".frontend.image.tag = \"${{ needs.build-and-push.outputs.sha_tag }}\"" \
            charts/values.yaml

      - name: Commit
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@openstreetlifting.org"
          git add charts/values.yaml
          git diff --cached --quiet || git commit \
            -m "chore(deploy): bump frontend to ${{ needs.build-and-push.outputs.sha_tag }} [skip ci]"
          git push
