name: "Continuous Delivery"
on:
  workflow_run:
    workflows: ["Backend CI", "Frontend CI"]
    types: [completed]
permissions:
  contents: write
  packages: write
env:
  REGISTRY: ghcr.io
jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.name == 'Backend CI'
    outputs:
      sha_tag: ${{ steps.sha_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set SHA tag
        id: sha_tag
        run: |
          echo "tag=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/openstreetlifting/backend:${{ steps.sha_tag.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          build-args: BIN=osl_api

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.name == 'Frontend CI'
    outputs:
      sha_tag: ${{ steps.sha_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Set SHA tag
        id: sha_tag
        run: |
          echo "tag=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          platforms: linux/amd64,
          tags: ${{ env.REGISTRY }}/openstreetlifting/frontend:${{ steps.sha_tag.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  update-chart:
    name: Update Chart
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always() && !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Bump image tags in chart
        run: |
          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            yq -i ".backend.image.tag = \"${{ needs.build-backend.outputs.sha_tag }}\"" \
              charts/values.yaml
          fi
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            yq -i ".frontend.image.tag = \"${{ needs.build-frontend.outputs.sha_tag }}\"" \
              charts/values.yaml
          fi
      - name: Commit
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@openstreetlifting.org"
          git add charts/values.yaml
          git diff --cached --quiet || git commit \
            -m "chore(deploy): bump images [skip ci]"
          git pull --rebase
          git push
