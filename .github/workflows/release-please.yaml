name: release-please
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - if: ${{ steps.release.outputs.pr }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - if: ${{ steps.release.outputs.pr }}
        name: Update Cargo.lock after version bump
        run: |
          cargo update --workspace --manifest-path backend/Cargo.toml
          git config user.name "ci-bot"
          git config user.email "ci-bot@openstreetlifting.org"
          git add backend/Cargo.lock
          git diff --cached --quiet || git commit \
            -m "chore(backend): update Cargo.lock after version bump [skip ci]"
          git push
