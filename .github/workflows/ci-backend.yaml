name: CI Backend

on:
  push:
    paths:
      - backend/**
      - .github/workflows/ci-backend.yaml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/ci-backend.yaml
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Run clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets --all-features --locked

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: openstreetlifting
          POSTGRES_PASSWORD: openstreetlifting
          POSTGRES_DB: openstreetlifting
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://openstreetlifting:openstreetlifting@localhost:5432/openstreetlifting
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli,cargo-nextest
      - name: Run migrations
        working-directory: backend
        run: sqlx migrate run --source crates/osl_db/migrations
      - name: Run tests
        working-directory: backend
        run: cargo nextest run --workspace --all-features --locked

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build release
        working-directory: backend
        run: cargo build --release --locked --workspace

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs: [format, lint, test, build]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
