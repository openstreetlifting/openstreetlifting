name: "[Back] Continuous Delivery"
on:
  push:
    branches: [main]
    paths:
      - backend/**

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openstreetlifting/backend

jobs:
  update-chart:
    name: Update Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump backend image tag in chart
        run: |
          yq -i ".backend.image.tag = \"${{ needs.build-and-push.outputs.sha_tag }}\"" \
            charts/values.yaml

      - name: Commit
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@openstreetlifting.org"
          git add charts/values.yaml
          git diff --cached --quiet || git commit \
            -m "chore(deploy): bump backend to ${{ needs.build-and-push.outputs.sha_tag }}"
          git push
