name: "[Back] Continuous Delivery"
on:
  workflow_run:
    workflows: ["[Back] Publish"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  update-chart:
    name: Update Chart
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - name: Compute SHA tag
        id: meta
        run: echo "sha_tag=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Bump backend image tag in chart
        run: |
          yq -i ".backend.image.tag = \"${{ steps.meta.outputs.sha_tag }}\"" \
            charts/values.yaml
      - name: Commit
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@openstreetlifting.org"
          git add charts/values.yaml
          git diff --cached --quiet || git commit \
            -m "chore(deploy): bump backend to ${{ steps.meta.outputs.sha_tag }}"
          git push
