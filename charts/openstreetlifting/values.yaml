frontend:
  image:
    repository: ghcr.io/openstreetlifting/frontend
    tag: sha-a10291e
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 3000
  env:
    backendUrl: "http://openstreetlifting-backend:8080"

backend:
  image:
    repository: ghcr.io/openstreetlifting/backend
    tag: sha-a10291e
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
  config:
    host: "0.0.0.0"
    port: "8080"
    logFormat: "json"
    db:
      user: "appuser"
      name: "appdb"
      host: "192.168.1.1"
      port: "5432"
  secret:
    dbPassword: ""
    databaseUrl: ""
    apiKeys: ""

ingress:
  frontendHost: "openstreetlifting.org"
  backendHost: "api.openstreetlifting.org"
  tls: true
