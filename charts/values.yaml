frontend:
  image:
    repository: ghcr.io/openstreetlifting/frontend
    tag: 0.2.0
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 3000
  env:
    backendUrl: "http://openstreetlifting-backend:8080"
backend:
  image:
    repository: ghcr.io/openstreetlifting/backend
    tag: sha-f184d9d
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8080
  config:
    host: "0.0.0.0"
    port: 8080
    logFormat: "json"
    db:
      user: "appuser"
      name: "appdb"
      host: "localhost"
      port: "5432"
ingress:
  frontendHost: "localhost"
  backendHost: "localhost"
  tls: false
